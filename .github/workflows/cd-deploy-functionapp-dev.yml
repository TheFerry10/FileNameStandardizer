name: CD - Deploy Function App (dev)

on:
  workflow_run:
    workflows:
      - CD - Terraform Infra (dev)
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      runSmokeTest:
        description: "Run post-deploy blob-trigger smoke test"
        required: false
        default: "true"

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-functionapp-main
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    environment: dev
    env:
      RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP_NAME }}
      FUNCTION_APP_NAME: ${{ vars.FUNCTION_APP_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3C798445C3CF40C9A4AB7F7D4D241594 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C2EB7D27D79F49419DF34E0753F96AE7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C3DDD9D8A58B4D4EA90F55DDC66AD397 }}

      - name: Validate required GitHub Variables
        run: |
          [[ -n "${RESOURCE_GROUP}" ]] || { echo "Missing repository variable RESOURCE_GROUP_NAME"; exit 1; }
          [[ -n "${FUNCTION_APP_NAME}" ]] || { echo "Missing repository variable FUNCTION_APP_NAME"; exit 1; }

      - name: Deploy with repository script
        env:
          RUN_SMOKE_TEST: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.runSmokeTest || 'true' }}
        run: |
          chmod +x scripts/deploy-functionapp.sh
          ./scripts/deploy-functionapp.sh
